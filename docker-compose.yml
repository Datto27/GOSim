services:
  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: gosim
      POSTGRES_PASSWORD: gosim
      POSTGRES_DB: gosim
    ports:
      - "5432:5432"
    volumes:
      - gosim_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gosim"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gosim_pgdata:
